name: CDM-OBS Table Change Proposal
description: Use this template to propose edits or additions to CDM-OBS model tables.
title: "[Table Change] "
labels: ["table-edit", "needs-review"]
assignees: []

body:
  - type: input
    id: contributor_name
    attributes:
      label: Contributor Name
      placeholder: Enter your full name
    validations:
      required: true

  - type: input
    id: contributor_role
    attributes:
      label: Role
      placeholder: Task Lead / Reviewer / etc.
    validations:
      required: true

  - type: input
    id: contributor_contact
    attributes:
      label: GitHub Handle or Email
      placeholder: username or email
    validations:
      required: true

  - type: input
    id: table_file
    attributes:
      label: Target Table File Name
      description: Enter the file name of the table from cdm-obs/tables
      placeholder: instruments.csv
    validations:
      required: true

  - type: textarea
    id: table_description
    attributes:
      label: Table Description
      description: Brief description of the table
      placeholder: List of observation instruments used in CDM-OBS
    validations:
      required: true

  - type: checkboxes
    id: change_type
    attributes:
      label: Type of Change
      options:
        - label: Correction (typo, value fix)
        - label: New entry addition
        - label: Unit or value update
        - label: Structural change (column rename, new column)
        - label: Metadata enhancement
        - label: Deprecation or retirement
        - label: Other
    validations:
      required: true

  - type: textarea
    id: current_content
    attributes:
      label: Current Content (before change)
      description: Paste relevant snippet from the table
    validations:
      required: true

  - type: textarea
    id: proposed_content
    attributes:
      label: Proposed Content (after change)
      description: Show the updated snippet clearly
    validations:
      required: true

  - type: textarea
    id: rationale
    attributes:
      label: Motivation & Rationale
      description: Explain why this change is needed and reference standards/docs

  - type: textarea
    id: impact
    attributes:
      label: Impact Assessment
      description: Downstream systems affected, backward compatibility, testing/validation

  - type: textarea
    id: reviewer_notes
    attributes:
      label: Reviewer Notes / Additional Comments
      description: Optional guidance for reviewers